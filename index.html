<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nereides Pilot Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-authenticated="true">
  <main class="pilot-shell">
    <header class="pilot-header">
      <div class="signal-card">
        <span class="signal-label">Liaison</span>
        <strong id="link-state">Non connectee</strong>
      </div>
      <div class="signal-card signal-card-wide">
        <span class="signal-label">Etat</span>
        <strong id="mission-state">En attente</strong>
      </div>
      <div class="signal-card">
        <span class="signal-label">Maj</span>
        <strong id="last-update">--:--:--</strong>
      </div>
    </header>

    <section class="alert-banner" id="alert-banner">
      <span id="alert-state">Aucune alerte active</span>
    </section>

    <section class="priority-board" aria-label="Mesures prioritaires pilote">
      <article class="pilot-card pilot-card-hero" data-tone-target="gps_speed_kmh">
        <span class="pilot-card-label">GPS vitesse</span>
        <strong class="pilot-card-value" data-field="gps_speed_kmh">--</strong>
        <span class="pilot-card-unit">km/h</span>
      </article>

      <article class="pilot-card pilot-card-status" data-tone-target="controller_safety">
        <span class="pilot-card-label">CM FNB</span>
        <strong class="pilot-card-value pilot-card-value-text" data-field="controller_safety">--</strong>
        <span class="pilot-card-unit">etat</span>
      </article>

      <article class="pilot-card" data-tone-target="battery_soc">
        <span class="pilot-card-label">Batterie SOC</span>
        <strong class="pilot-card-value" data-field="battery_soc">--</strong>
        <span class="pilot-card-unit">%</span>
      </article>

      <article class="pilot-card" data-tone-target="battery_temperature">
        <span class="pilot-card-label">Batterie TempMax</span>
        <strong class="pilot-card-value" data-field="battery_temperature">--</strong>
        <span class="pilot-card-unit">degC</span>
      </article>

      <article class="pilot-card" data-tone-target="battery_current">
        <span class="pilot-card-label">Batterie Current</span>
        <strong class="pilot-card-value" data-field="battery_current">--</strong>
        <span class="pilot-card-unit">A</span>
      </article>

      <article class="pilot-card" data-tone-target="controller_temperature">
        <span class="pilot-card-label">CM TempCM</span>
        <strong class="pilot-card-value" data-field="controller_temperature">--</strong>
        <span class="pilot-card-unit">degC</span>
      </article>

      <article class="pilot-card" data-tone-target="controller_current">
        <span class="pilot-card-label">CM Current</span>
        <strong class="pilot-card-value" data-field="controller_current">--</strong>
        <span class="pilot-card-unit">A</span>
      </article>
    </section>

    <section class="system-strip" aria-label="Etat systeme">
      <div class="system-pill">
        <span>Alimentation</span>
        <strong class="badge neutral" id="status-power">En attente</strong>
      </div>
      <div class="system-pill">
        <span>Refroidissement</span>
        <strong class="badge neutral" id="status-cooling">En attente</strong>
      </div>
      <div class="system-pill">
        <span>Controleur</span>
        <strong class="badge neutral" id="status-controller">En attente</strong>
      </div>
      <div class="system-pill">
        <span>Comms</span>
        <strong class="badge neutral" id="status-comms">En attente</strong>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
