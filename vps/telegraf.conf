[agent]
  interval = "1s"
  flush_interval = "1s"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["nereides/telemetry"]
  data_format = "json"
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  topic_tag = ""

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "mon-token-telemetry-2024"
  organization = "bateau"
  bucket = "telemetry"
