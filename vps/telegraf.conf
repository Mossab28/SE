[agent]
  interval = "1s"
  flush_interval = "1s"

# Horodatage a la RECEPTION (heure serveur) et non selon le champ "timestamp"
# de la trame : l'horloge du Raspberry n'est pas fiable (pas de NTP, decalage
# de +2h apres reboot) et certaines trames n'ont pas de champ timestamp, ce qui
# provoquait l'erreur "json_time_key could not be found" + des points ecrits a
# de mauvaises dates (donc invisibles dans Grafana sur une plage recente).
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["nereides/telemetry"]
  data_format = "json"
  topic_tag = ""

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["nereides/predictions"]
  data_format = "json"
  topic_tag = ""

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "mon-token-telemetry-2024"
  organization = "bateau"
  bucket = "telemetry"
