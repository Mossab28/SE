services:
  frontend:
    build:
      context: ..
      dockerfile: vps/Dockerfile.frontend
    container_name: frontend
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: mossab
      DOCKER_INFLUXDB_INIT_PASSWORD: mossab123influx
      DOCKER_INFLUXDB_INIT_ORG: bateau
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: mon-token-telemetry-2024

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: mossab
      GF_SECURITY_ADMIN_PASSWORD: mossab123
      GF_SERVER_ROOT_URL: http://212.227.88.180/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: "500ms"
    depends_on:
      - influxdb

  cert-init:
    image: alpine
    container_name: cert-init
    restart: "no"
    volumes:
      - mosquitto-certs:/certs
    command: >
      sh -c "
        [ -f /certs/server.crt ] && echo 'Certs already present' && exit 0 ;
        apk add --no-cache openssl ;
        openssl genrsa -out /certs/ca.key 2048 ;
        openssl req -new -x509 -days 3650 -key /certs/ca.key -out /certs/ca.crt -subj '/CN=Nereides-CA' ;
        openssl genrsa -out /certs/server.key 2048 ;
        openssl req -new -out /certs/server.csr -key /certs/server.key -subj '/CN=212.227.88.180' ;
        openssl x509 -req -in /certs/server.csr -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial -out /certs/server.crt -days 3650 ;
        rm /certs/server.csr ;
        chmod 644 /certs/*.crt /certs/*.key ;
        echo 'TLS certs generated OK'
      "

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-certs:/mosquitto/certs:ro
      - mosquitto-data:/mosquitto/data
    depends_on:
      cert-init:
        condition: service_completed_successfully

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    restart: unless-stopped
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - mosquitto
      - influxdb

  backend:
    build:
      context: ..
      dockerfile: vps/Dockerfile
    container_name: backend-telemetry
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - backend-uploads:/app/uploads
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: nereides/telemetry
      AI_PREDICTOR_URL: http://ai-predictor:8002
    depends_on:
      - mosquitto
      - influxdb
      - ai-predictor

  ai-predictor:
    build:
      context: ..
      dockerfile: vps/Dockerfile.predictor
    container_name: ai-predictor
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: nereides/telemetry
      # Calibre sur un run reel (2026-07-03, 32min, SOC 95%->90%) : ~128 Wh/%SOC
      # pour le pack complet (2 batteries en parallele) => ~12800 Wh.
      BATTERY_CAPACITY_WH: "12800"
      RACE_TARGET_HOURS: "1.0"
    depends_on:
      - mosquitto

volumes:
  influxdb-data:
  grafana-data:
  mosquitto-data:
  mosquitto-certs:
  backend-uploads:
