<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nereides - Envoyer un message pilote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050505;
  --panel: #101010;
  --line: #2a2a2a;
  --text: #f4f0e6;
  --muted: #bdb49b;
  --accent: #ffe600;
  --ok: #72ff66;
  --alert: #ff5a36;
  --shadow: 0 14px 36px rgba(0, 0, 0, 0.38);
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  min-height: 100%;
  background: radial-gradient(circle at top, rgba(255, 230, 0, 0.1), transparent 24%),
              linear-gradient(180deg, #151515 0%, #070707 55%, #000 100%);
  color: var(--text);
  font-family: "IBM Plex Sans", sans-serif;
}
.shell {
  max-width: 520px;
  margin: 0 auto;
  padding: 24px 16px 60px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
h1 {
  font-family: "Barlow Condensed", sans-serif;
  font-weight: 700;
  letter-spacing: 0.02em;
  font-size: 28px;
  margin: 8px 0 0;
}
.sub {
  color: var(--muted);
  margin: 0 0 8px;
  font-size: 14px;
}
.card {
  border: 2px solid var(--line);
  border-radius: 18px;
  box-shadow: var(--shadow);
  background: var(--panel);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
label {
  font-size: 13px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
input[type="text"], input[type="url"], textarea, input[type="number"] {
  width: 100%;
  background: #0a0a0a;
  border: 2px solid var(--line);
  border-radius: 10px;
  color: var(--text);
  padding: 10px 12px;
  font-size: 15px;
  font-family: inherit;
}
textarea { resize: vertical; min-height: 70px; }
input:focus, textarea:focus { outline: none; border-color: var(--accent); }
.row { display: flex; gap: 12px; }
.row > * { flex: 1; }
button {
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 16px;
  font-weight: 700;
  font-family: "Barlow Condensed", sans-serif;
  letter-spacing: 0.03em;
  cursor: pointer;
  background: var(--accent);
  color: #111;
}
button:active { transform: translateY(1px); }
button:disabled { opacity: 0.5; cursor: default; }
.presets { display: flex; flex-wrap: wrap; gap: 8px; }
.presets button {
  background: #1a1a1a;
  color: var(--text);
  border: 2px solid var(--line);
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
}
#status {
  font-size: 14px;
  min-height: 20px;
}
#status.ok { color: var(--ok); }
#status.err { color: var(--alert); }
#preview, #preview-video {
  max-width: 100%;
  max-height: 200px;
  border-radius: 10px;
  border: 2px solid var(--line);
  display: none;
}
input[type="file"] {
  width: 100%;
  color: var(--muted);
  font-size: 13px;
}
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.divider::before, .divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}
#upload-status {
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>
<body>
  <div class="shell">
    <h1>Nereides &mdash; Message pilote</h1>
    <p class="sub">Envoie un texte / une image en overlay plein ecran sur l'ecran pilote embarque. Il revient automatiquement a la telemetrie apres la duree choisie.</p>

    <div class="card">
      <div>
        <label for="text">Texte</label>
        <textarea id="text" placeholder="Message a afficher..."></textarea>
      </div>

      <div>
        <label for="mediaFile">Image ou video (depuis ce PC)</label>
        <input type="file" id="mediaFile" accept="image/*,video/*">
        <div id="upload-status"></div>
        <img id="preview" alt="apercu">
        <video id="preview-video" controls muted></video>
      </div>

      <div class="divider">ou</div>

      <div>
        <label for="mediaUrl">Lien direct (URL)</label>
        <input type="url" id="mediaUrl" placeholder="https://...jpg ou .mp4">
      </div>

      <div class="row">
        <div>
          <label for="duration">Duree (s)</label>
          <input type="number" id="duration" value="8" min="1" max="30" step="1">
        </div>
      </div>

      <div class="presets">
        <button type="button" data-preset="Hello !">Hello</button>
        <button type="button" data-preset="RAS, tout va bien.">RAS</button>
        <button type="button" data-preset="Attention manoeuvre en cours.">Manoeuvre</button>
        <button type="button" data-preset="Retour a quai demande.">Retour a quai</button>
      </div>

      <button id="send">Envoyer</button>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const BACKEND_ORIGIN = "https://nereides.pwn-ai.fr/backend";
    const TRIGGER_URL = BACKEND_ORIGIN + "/trigger";
    const UPLOAD_URL = BACKEND_ORIGIN + "/upload";

    const textEl = document.getElementById("text");
    const fileEl = document.getElementById("mediaFile");
    const urlEl = document.getElementById("mediaUrl");
    const durationEl = document.getElementById("duration");
    const previewEl = document.getElementById("preview");
    const previewVideoEl = document.getElementById("preview-video");
    const uploadStatusEl = document.getElementById("upload-status");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("send");

    // Rempli par l'upload (prioritaire sur le champ URL si present)
    let uploadedMedia = null; // { url, media_type }

    function showPreview(url, mediaType) {
      if (mediaType === "video") {
        previewVideoEl.src = url;
        previewVideoEl.style.display = "block";
        previewEl.style.display = "none";
      } else {
        previewEl.src = url;
        previewEl.style.display = "block";
        previewVideoEl.style.display = "none";
      }
    }

    fileEl.addEventListener("change", async function() {
      const file = fileEl.files[0];
      uploadedMedia = null;
      if (!file) {
        return;
      }

      uploadStatusEl.textContent = "Upload en cours...";
      try {
        const formData = new FormData();
        formData.append("file", file);
        const res = await fetch(UPLOAD_URL, { method: "POST", body: formData });
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        const data = await res.json();
        uploadedMedia = { url: BACKEND_ORIGIN.replace(/\/backend$/, "") + data.url, media_type: data.media_type };
        showPreview(uploadedMedia.url, uploadedMedia.media_type);
        uploadStatusEl.textContent = "Upload OK (" + data.media_type + ").";
      } catch (err) {
        uploadStatusEl.textContent = "Echec upload : " + err.message;
      }
    });

    urlEl.addEventListener("input", function() {
      const url = urlEl.value.trim();
      if (!url) {
        return;
      }
      uploadedMedia = null;
      fileEl.value = "";
      uploadStatusEl.textContent = "";
      const mediaType = /\.(mp4|webm|mov)$/i.test(url) ? "video" : "image";
      showPreview(url, mediaType);
    });

    document.querySelectorAll(".presets button").forEach(function(btn) {
      btn.addEventListener("click", function() {
        textEl.value = btn.getAttribute("data-preset");
      });
    });

    async function sendTrigger() {
      const text = textEl.value.trim();
      const urlValue = urlEl.value.trim();
      const durationS = Math.min(30, Math.max(1, Number(durationEl.value) || 8));

      let mediaUrl = null;
      let mediaType = "image";
      if (uploadedMedia) {
        mediaUrl = uploadedMedia.url;
        mediaType = uploadedMedia.media_type;
      } else if (urlValue) {
        mediaUrl = urlValue;
        mediaType = /\.(mp4|webm|mov)$/i.test(urlValue) ? "video" : "image";
      }

      if (!text && !mediaUrl) {
        statusEl.textContent = "Ajoute un texte, une image ou une video.";
        statusEl.className = "err";
        return;
      }

      sendBtn.disabled = true;
      statusEl.textContent = "Envoi en cours...";
      statusEl.className = "";

      try {
        const res = await fetch(TRIGGER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text: text || null,
            media_url: mediaUrl,
            media_type: mediaType,
            duration_s: durationS,
          }),
        });
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        statusEl.textContent = "Envoye. Affiche cote pilote pendant " + durationS + "s.";
        statusEl.className = "ok";
      } catch (err) {
        statusEl.textContent = "Echec de l'envoi : " + err.message;
        statusEl.className = "err";
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendTrigger);
  </script>
</body>
</html>
